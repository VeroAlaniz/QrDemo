<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Demo Troll</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      cursor: pointer;
    }

    #start {
      color: white;
      font-size: 2rem;
      text-align: center;
      margin-top: 40vh;
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: none;
    }

    /* 💀 POPUPS */
    .popup {
      position: fixed;
      width: 220px;
      height: 140px;
      background: white;
      color: black;
      border: 3px solid red;
      font-size: 13px;
      z-index: 9999;
      animation: shake 0.2s infinite;
      box-shadow: 0 0 15px red;
    }

    .popup-header {
      background: red;
      color: white;
      padding: 5px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .close-btn {
      cursor: pointer;
      font-weight: bold;
    }

    .popup-body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100px;
      text-align: center;
      font-weight: bold;
    }

    @keyframes shake {
      0% { transform: translate(0px, 0px); }
      50% { transform: translate(3px, -3px); }
      100% { transform: translate(-3px, 3px); }
    }

    /* 📱 responsive */
    @media (max-width: 600px) {
      .popup {
        width: 140px;
        height: 100px;
        font-size: 10px;
      }
    }
  </style>
</head>

<body onclick="startDemo()">

<div id="start">
  ▶ Click para ver contenido
</div>

<video id="video">
  <source src="You Are An Idiot.mp4" type="video/mp4">
</video>

<div id="popup-container"></div>

<script>
let popupCount = 0;
const maxPopups = 25;

let demoStarted = false;

function createPopup() {
  if (popupCount >= maxPopups) return;

  const popup = document.createElement("div");
  popup.className = "popup";

  popup.style.top = Math.random() * window.innerHeight + "px";
  popup.style.left = Math.random() * window.innerWidth + "px";

  popup.innerHTML = `
    <div class="popup-header">
      ERROR
      <span class="close-btn">X</span>
    </div>
    <div class="popup-body">
      YOU ARE AN IDIOT
    </div>
  `;

  popup.querySelector(".close-btn").onclick = (e) => {
    e.stopPropagation();
    popup.remove();
    popupCount--;

    for (let i = 0; i < 2; i++) {
      setTimeout(createPopup, 100);
    }
  };

  document.getElementById("popup-container").appendChild(popup);
  popupCount++;
}

function handleClick() {
  const video = document.getElementById("video");

  // 👉 PRIMER CLICK: inicia todo
  if (!demoStarted) {
    demoStarted = true;

    document.getElementById("start").style.display = "none";
    video.style.display = "block";

    video.muted = false;
    video.play();

    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen();
    }

    // movimiento de ventanas
    setInterval(() => {
      document.querySelectorAll(".popup").forEach(p => {
        p.style.top = Math.random() * window.innerHeight + "px";
        p.style.left = Math.random() * window.innerWidth + "px";
      });
    }, 800);

    // redirección
    video.onended = () => {
      window.location.href = "explicacion.html";
    };

  } else {
    // 👉 CLICKS SIGUIENTES: generan caos 😈
    for (let i = 0; i < 2; i++) {
      createPopup();
    }
  }
}

// 👇 ahora usamos ESTE handler
document.body.onclick = handleClick;


</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Demo Troll</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      cursor: pointer;
    }

    #start {
      color: white;
      font-size: 2rem;
      text-align: center;
      margin-top: 40vh;
      z-index: 10;
      position: relative;
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: none;
    }

    /* 😈 CARITAS */
   .face {
  position: fixed;
  width: 70px;          /* tamaño */
  height: 70px;

  border-radius: 50%;   /* 🔥 redonda */

  object-fit: cover;

  z-index: 9999;
  pointer-events: none;

  animation: bounce 3s linear infinite;

  box-shadow: 0 0 15px rgb(255, 255, 255);
}

    @keyframes bounce {
      0% {
        transform: translate(0,0) rotate(0deg);
      }

      25% {
        transform: translate(100px,-80px) rotate(10deg);
      }

      50% {
        transform: translate(-100px,80px) rotate(-10deg);
      }

      75% {
        transform: translate(80px,100px) rotate(5deg);
      }

      100% {
        transform: translate(0,0) rotate(0deg);
      }
    }

    /* 📱 responsive */
    @media (max-width: 600px) {
      .face {
        width: 70px;
      }

      #start {
        font-size: 1.5rem;
        padding: 20px;
      }
    }

  </style>
</head>

<body>

<div id="start">
  ▶ Click para ver contenido
</div>

<video id="video">
  <source src="You Are An Idiot.mp4" type="video/mp4">
</video>

<script>

let demoStarted = false;

function startDemo() {

  const video = document.getElementById("video");

  // 👉 SOLO EL PRIMER CLICK inicia todo
  if (!demoStarted) {

    demoStarted = true;

    document.getElementById("start").style.display = "none";

    video.style.display = "block";

    video.muted = false;
    video.play();

    // fullscreen
    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen();
    }

    // termina → redirige
    video.onended = () => {
      window.location.href = "explicacion.html";
    };

  } else {

    // 😈 clicks siguientes → generan caritas
    createFace();

  }
}

function createFace() {

  const img = document.createElement("img");

  img.src = "idiot.png"; // tu imagen

  img.className = "face";

  img.style.left = Math.random() * window.innerWidth + "px";

  img.style.top = Math.random() * window.innerHeight + "px";

  document.body.appendChild(img);
}

document.body.onclick = startDemo;

</script>

</body>
</html>

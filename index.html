<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Demo</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      cursor: pointer;
    }

    #start {
      color: white;
      font-size: 2rem;
      text-align: center;
      margin-top: 40vh;
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: none;
    }
  </style>
</head>

<body onclick="startDemo()">

<div id="start">
  ▶ Click para ver contenido
</div>

<video id="video" loop>
  <source src="video.mp4" type="video/mp4">
</video>

<script>
function startDemo() {
  const video = document.getElementById("video");

  document.getElementById("start").style.display = "none";
  video.style.display = "block";

  video.muted = false;
  video.play();

  // fullscreen
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen();
  }

  // 🔥 cuando termina el video → redirige
  video.onended = () => {
    window.location.href = "explicacion.html";
  };
}
</script>

</body>
</html>
